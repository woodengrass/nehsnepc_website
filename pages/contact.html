<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — NEHS Photography Club</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/css/main.css">
  <link rel="stylesheet" href="../assets/css/sidebar.css">
  <link rel="stylesheet" href="../assets/css/contact.css">
</head>
<body class="page-contact">

  <div class="grain-overlay" aria-hidden="true"></div>

  <main class="contact-layout" style="display:flex;">

    <!-- ——— Left column: title + accordion ——— -->
    <div class="contact-left">

      <header class="contact-header">
        <h1 class="contact-title">CONTACT</h1>
        <div class="contact-title-line" aria-hidden="true"></div>
        <p class="contact-subtitle">「誠摯邀請各社各校與我們合辦活動／委託拍攝」</p>
      </header>

      <div class="accordion">

        <!-- Entry 1: 聯絡 -->
        <div class="accordion-item">
          <button class="accordion-trigger"
                  aria-expanded="false"
                  aria-controls="acc-contact-body">
            <span class="accordion-label">聯絡</span>
            <span class="accordion-icon" aria-hidden="true">+</span>
          </button>
          <div class="accordion-body" id="acc-contact-body">
            <div class="accordion-content">
              <button id="copyEmail" class="email-copy-btn">contact@nehsnepc.com</button>
            </div>
          </div>
        </div>

        <!-- Entry 2: 接拍 — opens modal instead of expanding -->
        <div class="accordion-item" id="shootItem">
          <button class="accordion-trigger" id="shootTrigger"
                  aria-haspopup="dialog">
            <span class="accordion-label">接拍</span>
            <span class="accordion-icon" aria-hidden="true">+</span>
          </button>
          <div class="accordion-body" aria-hidden="true"></div>
        </div>

        <!-- Entry 3: 社群 -->
        <div class="accordion-item">
          <button class="accordion-trigger"
                  aria-expanded="false"
                  aria-controls="acc-social-body">
            <span class="accordion-label">社群</span>
            <span class="accordion-icon" aria-hidden="true">+</span>
          </button>
          <div class="accordion-body" id="acc-social-body">
            <div class="accordion-content">
              <a href="https://instagram.com/nehs_nepc"
                 target="_blank"
                 rel="noopener"
                 class="social-link">@nehs_nepc</a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- ——— Right column: fixed photo ——— -->
    <div class="contact-right" aria-hidden="true">
      <img src="../assets/images/contact-bg.jpg"
           alt=""
           class="contact-photo">
    </div>

  </main>


  <!-- ——— 接拍 modal ——— -->
  <div class="shoot-modal" id="shootModal" role="dialog" aria-modal="true"
       aria-label="接拍申請表單" aria-hidden="true">
    <div class="shoot-modal-backdrop" id="shootModalBackdrop"></div>
    <div class="shoot-modal-box">
      <button class="shoot-modal-close" id="shootModalClose"
              aria-label="關閉表單">&#215;</button>
      <iframe
        src="https://tally.so/embed/NpRGgl?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        width="100%"
        height="100%"
        frameborder="0"
        title="接拍申請表單"
        style="background:transparent;flex:1;min-height:0;">
      </iframe>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════════
       Right sidebar
       ═══════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar" aria-label="Site navigation sidebar">
    <div class="sidebar-edge" id="sidebarEdge" aria-hidden="true"></div>
    <div class="sidebar-panel" id="sidebarPanel">
      <div class="sidebar-header">
        <img src="../assets/images/logo.png"
             alt="NEHS Photography Club logo"
             class="sidebar-logo">
        <p class="sidebar-brand">NEHS Photo Club</p>
      </div>
      <nav class="sidebar-nav" aria-label="Sidebar navigation">
        <a href="../index.html"  class="sidebar-link" data-page="index">Home</a>
        <a href="about.html"     class="sidebar-link" data-page="about">About</a>
        <a href="portfolio.html" class="sidebar-link" data-page="portfolio">Portfolio</a>
        <a href="contact.html"   class="sidebar-link" data-page="contact">Contact</a>
      </nav>
      <p class="sidebar-copy">
        &copy; <span class="year-placeholder"></span> NEHS Photography Club
      </p>
    </div>
  </aside>


  <!-- ═══════════════════════════════════════════════
       Mobile navigation
       ═══════════════════════════════════════════════ -->
  <button class="hamburger" id="hamburger"
          aria-label="Open navigation menu" aria-expanded="false">
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
    <span class="hamburger-line"></span>
  </button>

  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <button class="mobile-close" id="mobileClose"
            aria-label="Close navigation menu">&#215;</button>
    <a href="../index.html" class="mobile-menu-logo-link">
      <img src="../assets/images/logo.png"
           alt="NEHS Photography Club"
           class="mobile-menu-logo">
    </a>
    <nav class="mobile-nav" aria-label="Mobile navigation">
      <a href="../index.html"  class="mobile-nav-link">Home</a>
      <a href="about.html"     class="mobile-nav-link">About</a>
      <a href="portfolio.html" class="mobile-nav-link">Portfolio</a>
      <a href="contact.html"   class="mobile-nav-link">Contact</a>
    </nav>
  </div>


  <script src="../assets/js/sidebar.js"></script>

  <script>
    (function () {
      'use strict';

      /* ——— Accordion (skip the 接拍 trigger) ——— */
      var items = Array.prototype.slice.call(
        document.querySelectorAll('.accordion-item')
      ).filter(function (item) {
        return item.id !== 'shootItem';
      });

      items.forEach(function (item) {
        var trigger = item.querySelector('.accordion-trigger');
        var body    = item.querySelector('.accordion-body');

        trigger.addEventListener('click', function () {
          var isOpen = item.classList.contains('open');

          items.forEach(function (i) {
            i.classList.remove('open');
            i.querySelector('.accordion-trigger').setAttribute('aria-expanded', 'false');
            i.querySelector('.accordion-body').style.maxHeight = '';
          });

          if (!isOpen) {
            item.classList.add('open');
            trigger.setAttribute('aria-expanded', 'true');
            body.style.maxHeight = body.scrollHeight + 'px';
          }
        });
      });

      /* ——— 接拍 modal ——— */
      var modal      = document.getElementById('shootModal');
      var backdrop   = document.getElementById('shootModalBackdrop');
      var shootBtn   = document.getElementById('shootTrigger');
      var closeBtn   = document.getElementById('shootModalClose');

      function openModal() {
        modal.classList.add('open');
        modal.setAttribute('aria-hidden', 'false');
        closeBtn.focus();
      }

      function closeModal() {
        modal.classList.remove('open');
        modal.setAttribute('aria-hidden', 'true');
        shootBtn.focus();
      }

      shootBtn.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);
      backdrop.addEventListener('click', closeModal);

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('open')) {
          closeModal();
        }
      });

      /* ——— Email clipboard copy ——— */
      var copyBtn = document.getElementById('copyEmail');
      if (copyBtn && navigator.clipboard) {
        copyBtn.addEventListener('click', function () {
          navigator.clipboard.writeText('contact@nehsnepc.com').then(function () {
            var orig = copyBtn.textContent;
            copyBtn.textContent = 'copied';
            setTimeout(function () { copyBtn.textContent = orig; }, 1800);
          });
        });
      }

    }());
  </script>

</body>
</html>
